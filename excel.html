<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel | Olivier Fiset-Dubois</title>
  <style>

    :root { --ink:#1d252c; --muted:#66717b; --line:#dfe3e6; --paper:#f5f5f3; --white:#ffffff; --accent:#2f5e78; --soft-blue:#edf4f7; }
    * { box-sizing: border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; font-family:Arial, Helvetica, sans-serif; color:var(--ink); background:var(--paper); line-height:1.55; }
    nav { position:sticky; top:0; z-index:10; display:flex; justify-content:space-between; align-items:center; gap:20px; padding:17px 8%; background:rgba(255,255,255,.97); border-bottom:1px solid var(--line); }
    .brand { color:var(--ink); font-size:16px; font-weight:800; letter-spacing:.4px; text-decoration:none; }
    .nav-links { display:flex; flex-wrap:wrap; gap:18px; }
    .nav-links a { color:var(--muted); font-size:14px; font-weight:700; text-decoration:none; }
    .nav-links a:hover, .nav-links a.active { color:var(--accent); }
    header { padding:78px 10% 62px; background:var(--white); border-bottom:1px solid var(--line); }
    .software-title { display:flex; align-items:center; gap:18px; }
    .software-title img { width:54px; height:54px; object-fit:contain; }
    .eyebrow { margin:0 0 14px; color:var(--accent); font-size:13px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; }
    h1 { margin:0; font-size:clamp(42px,6vw,72px); line-height:1.03; letter-spacing:-2px; }
    .intro { max-width:760px; margin:24px 0 0; color:var(--muted); font-size:19px; }
    main { padding:76px 10%; }
    .section-heading { display:flex; justify-content:space-between; align-items:end; gap:28px; margin-bottom:34px; }
    .section-heading h2 { margin:0; font-size:clamp(30px,4vw,46px); letter-spacing:-1px; }
    .section-heading p { max-width:500px; margin:0; color:var(--muted); }
    .gallery { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:22px; }
    .project-card { overflow:hidden; background:var(--white); border:1px solid var(--line); border-radius:12px; }
    .project-image { display:block; height:275px; padding:12px; background:#edf0f1; border-bottom:1px solid var(--line); }
    .project-image img { display:block; width:100%; height:100%; object-fit:contain; transition:transform .25s ease; }
    .project-card:hover .project-image img { transform:scale(1.025); }
    .project-info { padding:18px; }
    .project-info h3 { margin:0 0 8px; font-size:19px; }
    .project-info p { margin:0; color:var(--muted); font-size:14px; }
    .tags { display:flex; flex-wrap:wrap; gap:7px; margin-top:14px; }
    .tag { padding:5px 9px; color:#4d5962; background:#edf0f1; border-radius:999px; font-size:11px; font-weight:700; }
    .back-button { display:inline-block; margin-top:54px; padding:12px 17px; color:var(--white); background:var(--ink); border-radius:4px; font-size:14px; font-weight:800; text-decoration:none; }
    .back-button:hover { background:var(--accent); }
    footer { padding:25px 10%; color:var(--muted); background:var(--white); font-size:13px; text-align:center; }
    @media (max-width:980px) { .gallery { grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (max-width:650px) {
      nav { align-items:flex-start; flex-direction:column; padding:16px 7%; }
      header, main { padding-left:7%; padding-right:7%; }
      .section-heading { align-items:flex-start; flex-direction:column; }
      .gallery { grid-template-columns:1fr; }
      .project-image { height:245px; }
    }

    .analysis-grid {
      display:grid;
      grid-template-columns:minmax(0,1.5fr) minmax(280px,.8fr);
      gap:24px;
      align-items:stretch;
    }
    .analysis-grid .project-image {
      min-height:500px;
      height:auto;
      padding:18px;
    }
    .side-panel {
      display:flex;
      flex-direction:column;
      gap:20px;
    }
    .info-card, .future-card {
      padding:26px;
      background:var(--white);
      border:1px solid var(--line);
      border-radius:12px;
    }
    .info-number {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:34px;
      height:34px;
      margin-bottom:16px;
      color:var(--white);
      background:var(--accent);
      border-radius:50%;
      font-size:14px;
      font-weight:800;
    }
    .info-card h3, .future-card h3 {
      margin:0 0 9px;
      font-size:20px;
    }
    .info-card p, .future-card p {
      margin:0;
      color:var(--muted);
      font-size:14px;
    }
    .future-card {
      background:var(--soft-blue);
      border-color:#d9e5eb;
    }
    .future-card h3 { color:var(--accent); }
    @media (max-width:980px) {
      .analysis-grid { grid-template-columns:1fr; }
      .analysis-grid .project-image { min-height:390px; }
    }
    @media (max-width:650px) {
      .analysis-grid .project-image { min-height:280px; padding:12px; }
    }
  

    /* Grand format : texte et graphique agrandis à environ 150 %. */
    body { line-height: 1.6; }
    nav { padding: 26px 8%; }
    .brand { font-size: 24px; }
    .nav-links { gap: 27px; }
    .nav-links a { font-size: 21px; }
    header { padding: 108px 10% 88px; }
    .software-title { gap: 27px; }
    .software-title img { width: 81px; height: 81px; }
    .eyebrow { margin-bottom: 21px; font-size: 19.5px; letter-spacing: 1.8px; }
    h1 { font-size: clamp(63px, 9vw, 108px); }
    .intro { max-width: 920px; margin-top: 36px; font-size: 28.5px; }
    main { padding: 104px 8%; }
    .section-heading { gap: 42px; margin-bottom: 48px; }
    .section-heading h2 { font-size: clamp(45px, 6vw, 69px); }
    .section-heading p { max-width: 700px; font-size: 24px; }
    .analysis-grid { grid-template-columns: minmax(0, 1.8fr) minmax(380px, 1fr); gap: 36px; }
    .analysis-grid .project-image { min-height: 750px; padding: 27px; }
    .project-info { padding: 27px; }
    .project-info h3 { margin-bottom: 12px; font-size: 30px; }
    .project-info p { font-size: 21px; }
    .tags { gap: 10px; margin-top: 21px; }
    .tag { padding: 8px 13px; font-size: 16.5px; }
    .side-panel { gap: 30px; }
    .info-card, .future-card { padding: 39px; }
    .info-number { width: 51px; height: 51px; margin-bottom: 24px; font-size: 21px; }
    .info-card h3, .future-card h3 { margin-bottom: 14px; font-size: 30px; }
    .info-card p, .future-card p { font-size: 21px; }
    .back-button { margin-top: 78px; padding: 18px 26px; font-size: 21px; }
    footer { padding: 38px 10%; font-size: 19.5px; }

    @media (max-width: 980px) {
      .analysis-grid { grid-template-columns: 1fr; }
      .analysis-grid .project-image { min-height: 620px; }
    }

    @media (max-width: 650px) {
      nav { padding: 20px 7%; }
      .brand { font-size: 21px; }
      .nav-links { gap: 14px; }
      .nav-links a { font-size: 17px; }
      header, main { padding-left: 7%; padding-right: 7%; }
      header { padding-top: 74px; padding-bottom: 62px; }
      .eyebrow { font-size: 15px; }
      h1 { font-size: clamp(44px, 13vw, 68px); }
      .intro { font-size: 21px; }
      .section-heading h2 { font-size: 39px; }
      .section-heading p { font-size: 19px; }
      .analysis-grid .project-image { min-height: 400px; padding: 16px; }
      .project-info h3 { font-size: 25px; }
      .project-info p { font-size: 18px; }
      .info-card, .future-card { padding: 30px; }
      .info-card h3, .future-card h3 { font-size: 25px; }
      .info-card p, .future-card p { font-size: 18px; }
    }

  </style>
</head>
